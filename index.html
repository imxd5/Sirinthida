<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6 mx-auto p-0">
                <div class="card">
                    <div class="box">
                        <div class="form-snip">
                            <input type="radio" id="tab-1" name="tab" class="sign-in" checked>
                            <label for="tab-1" class="tab">Login</label>
                            <input type="radio" id="tab-2" name="tab" class="sign-up">
                            <label for="tab-2" class="tab">sign-up</label>
                            <div class="user-form">
                                <div class="login-form">
                                    <label for="login-username">Username</label>
                                    <input id="login-username" type="text" placeholder="Enter Username">
                                    <label for="login-password">Password</label>
                                    <input id="login-password" type="password" placeholder="Enter Password">
                                    <button class="btn btn-primary mt-3 mb-3">Sign in</button>
                                    <a href=""><span class="text-secondary">Forgot Password?</span></a>
                                </div>
                                <div class="sign-up-form">
                                    <label for="">Username</label>
                                    <input type="text" placeholder="Enter username">
                                    <label for="">Email</label>
                                    <input type="email" placeholder="Enter Email">
                                    <label for="">Password</label>
                                    <input type="password" placeholder="Enter Password">
                                    <label for="">Repeat Password</label>
                                    <input type="password" placeholder="Repeat Password">
                                    <button class="btn btn-primary mt-3">Sign Up</button>
                                    <label for="tab-1">Already member?</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
