<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" >
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-md-6 mx-auto p-0">
                <div class="card">
                    <div class="box">
                        <div class="form-snip">
                            <input type="radio" id="tab-1" name="tab" class="sign-in" checked>
                            <label for="tab-1" class="tab">Login</label>
                            <input type="radio" id="tab-2" name="tab" class="sign-up">
                            <label for="tab-2" class="tab">sign-up</label>
                            <div class="user-form">
                                <div class="login-form">
                                    <label for="login-username">Username</label>
                                    <input id="login-username" type="text" placeholder="Enter Username">
                                    <label for="login-password">Password</label>
                                    <input id="login-password" type="password" placeholder="Enter Password">
                                    <button class="btn btn-primary mt-3 mb-3" type="button" onclick="login()">Sign in</button>
                                    <a href=""><span class="text-secondary">Forgot Password?</span></a>
                                </div>
                                <div class="sign-up-form">
                                    <label for="reg-user">Username</label>
                                    <input id="reg-user" type="text" placeholder="Enter username">
                                    <label for="reg-email">Email</label>
                                    <input id="reg-email" type="email" placeholder="Enter Email">
                                    <label for="reg-pass">Password</label>
                                    <input id="reg-pass" type="password" placeholder="Enter Password">
                                    <label for="reg-confirm-pass">confirmPassword</label>
                                    <input id="reg-confirm-pass" type="password" placeholder="Confirm Password">
                                    <button class="btn btn-primary mt-3" type="button" onclick="register()">Sign Up</button>
                                    <label for="tab-1">Already member?</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

   <script>
        // ฟังก์ชันส่งข้อมูลสมัครสมาชิก
        async function register() {
            const Username = document.getElementById('reg-user').value.trim();
            const Email = document.getElementById('reg-email').value.trim();
            const Password = document.getElementById('reg-pass').value;
            const confirmPassword = document.getElementById('reg-confirm-pass').value;

            if (!Username || !Email || !Password || !confirmPassword) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }
            if (Password !== confirmPassword) {
                alert("รหัสผ่านและการยืนยันรหัสผ่านไม่ตรงกัน");
                return;
            }
            if (Password.length < 8) {
                alert("กรุณาตั้งรหัสผ่าน 8 ตัวอักษรขึ้นไป");
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Username, Email, Password, confirmPassword })
                });
                const data = await response.json();
                alert(data.message);
                
                if (response.status === 201) {
                    document.getElementById('reg-user').value = '';
                    document.getElementById('reg-email').value = '';
                    document.getElementById('reg-pass').value = '';
                    document.getElementById('reg-confirm-pass').value = '';
                }
            } catch (error) {
                alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
            }
        }

        // ฟังก์ชันส่งข้อมูลล็อกอิน
        async function login() {
            const Username = document.getElementById('login-username').value.trim();
            const Password = document.getElementById('login-password').value;

            if (!Username || !Password) {
                alert("กรุณากรอกชื่อผู้ใช้และรหัสผ่าน");
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ Username, Password })
                });
                const data = await response.json();
                alert(data.message);

                if (response.status === 200) {
                    // ล็อกอินผ่านสำเร็จ ให้เด้งไปหน้าระบบหลัก
                    window.location.href = '/page.html'; 
                }
            } catch (error) {
                alert("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้");
            }
        }
    </script>
</body>
</html>
